<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手</title>

    <style>
        :root {
            --bg: #f0f2f5;
            --card: #fff;
            --text: #1a1a2e;
            --sub: #888;
            --bubble-user: #2563eb;
            --bubble-ai: #fff;
            --border: #e5e5e5;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --accent-hover: #1d4ed8;
            --danger: #ef4444;
            --sidebar-w: 260px;
            --sidebar-collapsed-w: 54px;
            --header-h: 48px;
            --msg-bg: #fafafa;
            --input-bg: #f9f9f9;
            --ws-bg: #f8f9fb;
            --shadow: 0 2px 12px rgba(0,0,0,.08);
            --hover-row: #eef2ff;
            --active-row: #dbeafe;
            --code-bg: rgba(0,0,0,.06);
            --pre-bg: #1e1e2e;
            --pre-fg: #cdd6f4;
            --overlay-bg: rgba(0,0,0,.4);
        }

        [data-theme="dark"] {
            --bg: #111827;
            --card: #1f2937;
            --text: #e5e7eb;
            --sub: #9ca3af;
            --bubble-user: #3b82f6;
            --bubble-ai: #374151;
            --border: #374151;
            --accent: #3b82f6;
            --accent-light: #1e3a5f;
            --accent-hover: #60a5fa;
            --danger: #f87171;
            --msg-bg: #1a1f2e;
            --input-bg: #1f2937;
            --ws-bg: #1a1f2e;
            --shadow: 0 2px 12px rgba(0,0,0,.3);
            --hover-row: #1e3a5f;
            --active-row: #1e40af;
            --code-bg: rgba(255,255,255,.1);
            --pre-bg: #0d1117;
            --pre-fg: #c9d1d9;
            --overlay-bg: rgba(0,0,0,.7);
        }

        .accent-blue   { --accent: #2563eb; --bubble-user: #2563eb; --accent-hover: #1d4ed8; --accent-light: #eff6ff; }
        .accent-purple { --accent: #7c3aed; --bubble-user: #7c3aed; --accent-hover: #6d28d9; --accent-light: #f5f3ff; }
        .accent-green  { --accent: #059669; --bubble-user: #059669; --accent-hover: #047857; --accent-light: #ecfdf5; }
        .accent-orange { --accent: #ea580c; --bubble-user: #ea580c; --accent-hover: #c2410c; --accent-light: #fff7ed; }
        [data-theme="dark"] .accent-blue   { --accent-light: #1e3a5f; }
        [data-theme="dark"] .accent-purple { --accent-light: #3b1f6e; }
        [data-theme="dark"] .accent-green  { --accent-light: #064e3b; }
        [data-theme="dark"] .accent-orange { --accent-light: #431407; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            transition: background .3s, color .3s;
        }

        /* ========== 紧凑模式 ========== */
        .app {
            width: 100%;
            max-width: 520px;
            height: 100vh;
            background: var(--card);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: max-width .35s ease, border-radius .35s ease, background .3s;
        }
        @media (min-width: 521px) {
            .app { height: 94vh; max-height: 880px; border-radius: 18px; margin: 0 12px; }
        }

        /* ========== 宽屏模式 ========== */
        .app.wide {
            max-width: 100%;
            height: 100vh;
            max-height: 100vh;
            border-radius: 0;
            margin: 0;
            flex-direction: row;
        }

        .wide-sidebar {
            display: none;
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--ws-bg);
            border-right: 1px solid var(--border);
            flex-direction: column;
            transition: width .3s, min-width .3s, background .3s;
            overflow: hidden;
        }
        .app.wide .wide-sidebar { display: flex; }
        .app.wide .wide-sidebar.collapsed {
            width: var(--sidebar-collapsed-w);
            min-width: var(--sidebar-collapsed-w);
        }

        .ws-head {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            min-height: 46px;
        }
        .ws-head .ws-arrow {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform .3s, background .15s;
            color: var(--text);
        }
        .ws-head .ws-arrow:hover { background: var(--hover-row); }
        .wide-sidebar.collapsed .ws-head .ws-arrow { transform: rotate(180deg); }
        .ws-head .ws-title {
            flex: 1;
            font-weight: 700;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
        }
        .wide-sidebar.collapsed .ws-head .ws-title { display: none; }
        .ws-head .ws-new {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .ws-head .ws-new:hover { background: var(--accent-hover); }
        .wide-sidebar.collapsed .ws-head .ws-new { display: none; }

        .ws-list { flex: 1; overflow-y: auto; padding: 6px 0; }
        .ws-list .ws-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            cursor: pointer;
            gap: 10px;
            transition: background .1s;
            margin: 1px 8px;
            border-radius: 8px;
            overflow: hidden;
        }
        .ws-list .ws-item:hover { background: var(--hover-row); }
        .ws-list .ws-item.active { background: var(--active-row); }
        .ws-item .ws-icon {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .ws-item .ws-info { flex: 1; min-width: 0; }
        .wide-sidebar.collapsed .ws-item { padding: 10px 12px; justify-content: center; }
        .wide-sidebar.collapsed .ws-item .ws-info { display: none; }
        .wide-sidebar.collapsed .ws-item .ws-del { display: none; }
        .wide-sidebar.collapsed .ws-item .export-btn { display: none; }
        .wide-sidebar.collapsed .ws-head { padding: 12px 10px; justify-content: center; }
        .ws-item .ws-info .ws-t {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .ws-item .ws-t .ws-tag {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
            background: var(--accent-light);
            color: var(--accent);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ws-item .ws-t .ws-ctx {
            font-size: 9px;
            color: #22c55e;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ws-item .ws-info .ws-sub {
            font-size: 11px;
            color: var(--sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ws-item .ws-del,
        .ws-item .export-btn {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: none;
            background: none;
            color: var(--sub);
            font-size: 14px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .15s;
        }
        .ws-item:hover .ws-del,
        .ws-item:hover .export-btn { opacity: 1; }
        .ws-item .ws-del:hover { background: #fee2e2; color: #ef4444; }
        .ws-item .export-btn:hover { background: var(--accent-light); color: var(--accent); }

        .ws-empty {
            text-align: center;
            color: var(--sub);
            padding: 30px 14px;
            font-size: 13px;
        }

        .ws-quick-new {
            display: none;
            padding: 8px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .wide-sidebar.collapsed .ws-quick-new { display: block; }
        .ws-quick-new button {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .wide-settings { display: none; }
        .app.wide .wide-settings {
            display: flex;
            width: 0;
            min-width: 0;
            background: var(--card);
            border-left: 1px solid transparent;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transition: width .3s ease, min-width .3s ease, opacity .25s, border-color .3s, background .3s;
        }
        .app.wide .wide-settings.show {
            width: 340px;
            min-width: 340px;
            opacity: 1;
            border-left-color: var(--border);
        }

        .app.wide .main-col {
            flex: 1;
            min-width: 0;
        }
        .main-col {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .app.wide .header .btn-drawer { display: none; }
        .app.wide .drawer,
        .app.wide .drawer-overlay { display: none !important; }

        /* ========== 设置页签 ========== */
        .setting-tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 16px;
        }
        .setting-tabs .stab {
            flex: 1;
            padding: 10px 8px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--sub);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all .15s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: inherit;
        }
        .setting-tabs .stab:hover { color: var(--text); }
        .setting-tabs .stab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* ========== 顶栏 ========== */
        .header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--card);
            transition: background .3s;
        }
        .header button {
            width: 32px; height: 32px;
            border: none;
            background: none;
            font-size: 18px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background .15s;
            color: var(--text);
        }
        .header button:hover { background: var(--hover-row); }
        .header .title {
            flex: 1;
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
            min-width: 0;
        }
        .header .model-tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
            cursor: pointer;
        }

        .layout-switch {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
        }
        .layout-switch .ls-label { font-size: 11px; color: var(--sub); font-weight: 500; }
        .layout-switch .ls-track {
            width: 44px;
            height: 24px;
            background: #d1d5db;
            border-radius: 12px;
            position: relative;
            transition: background .3s;
        }
        .layout-switch .ls-track.on {
            background: var(--accent);
            box-shadow: 0 0 6px rgba(37,99,235,.3);
        }
        .layout-switch .ls-thumb {
            position: absolute;
            top: 2px; left: 2px;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 1px 3px rgba(0,0,0,.2);
            transition: left .3s;
        }
        .layout-switch .ls-track.on .ls-thumb { left: 22px; }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
        }
        .theme-toggle .theme-emoji { font-size: 15px; }

        /* ========== 消息区 ========== */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
            background: var(--msg-bg);
            transition: background .3s;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        .app.wide .messages { padding: 20px 40px; }

        .welcome {
            margin: auto;
            text-align: center;
            color: var(--sub);
            max-width: 300px;
            line-height: 1.7;
        }
        .welcome .icon { font-size: 48px; margin-bottom: 12px; }
        .welcome h3 { font-size: 18px; color: var(--text); margin-bottom: 6px; }
        .welcome p { font-size: 13px; }

        .msg {
            display: flex;
            gap: 8px;
            animation: fadeUp .3s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg.user { flex-direction: row-reverse; }
        .msg .avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            color: #fff;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            overflow: hidden;
        }
        .msg .avatar img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .msg.user .avatar { background: linear-gradient(135deg, #f59e0b, #ef4444); }
        .msg .body { max-width: 80%; }
        .app.wide .msg .body { max-width: 65%; }
        .msg .bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
            transition: background .3s, color .3s;
        }
        .msg.ai .bubble {
            background: var(--bubble-ai);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }
        .msg.user .bubble {
            background: var(--bubble-user);
            color: #fff;
            border-top-right-radius: 4px;
        }
        .msg .time {
            font-size: 10px;
            color: var(--sub);
            margin-top: 3px;
            padding: 0 4px;
        }
        .msg.user .time { text-align: right; }

        /* Markdown 样式 */
        .bubble p { margin: 4px 0; }
        .bubble p:first-child { margin-top: 0; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble ul, .bubble ol { margin: 4px 0; padding-left: 18px; }
        .bubble li { margin: 2px 0; }
        .bubble strong { font-weight: 600; }
        .bubble em { font-style: italic; }
        .bubble code {
            background: var(--code-bg);
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
        }
        .msg.user .bubble code { background: rgba(255,255,255,.2); }
        .bubble pre {
            background: var(--pre-bg);
            color: var(--pre-fg);
            border-radius: 8px;
            overflow: hidden;
            font-size: 13px;
            margin: 6px 0;
            line-height: 1.5;
        }
        .bubble pre .code-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 12px;
            font-size: 11px;
            font-family: inherit;
            color: #8b949e;
            border-bottom: 1px solid rgba(255,255,255,.08);
            user-select: none;
        }
        .bubble pre .code-copy {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            padding: 0;
        }
        .bubble pre .code-copy:hover { color: #fff; }
        .bubble pre code { display: block; background: none; padding: 12px; font-size: inherit; overflow-x: auto; }
        .bubble img { max-width: 100%; border-radius: 8px; margin: 6px 0; cursor: pointer; }
        .bubble a { color: var(--accent); text-decoration: underline; }
        .msg.user .bubble a { color: #fff; }
        .bubble blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 10px;
            color: var(--sub);
            margin: 4px 0;
        }
        .msg.user .bubble blockquote { border-color: rgba(255,255,255,.5); color: rgba(255,255,255,.85); }
        .bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
        .bubble table { border-collapse: collapse; margin: 4px 0; font-size: 13px; }
        .bubble th, .bubble td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }
        .bubble th { background: var(--msg-bg); }

        /* 推理模型的思考过程 */
        .bubble .think {
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--sub);
        }
        .bubble .think summary {
            cursor: pointer;
            user-select: none;
            font-weight: 500;
        }
        .bubble .think .think-body {
            margin-top: 6px;
            padding-left: 10px;
            border-left: 2px solid var(--border);
            line-height: 1.7;
        }

        .msg .copy-btn,
        .msg .retry-btn {
            display: none;
            font-size: 11px;
            color: var(--sub);
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 6px;
            margin-top: 2px;
            font-family: inherit;
        }
        .msg:hover .copy-btn,
        .msg:hover .retry-btn { display: inline-block; }
        .msg .retry-btn:hover { color: var(--accent); }
        .msg-actions { display: flex; gap: 4px; margin-top: 2px; }

        .typing span {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--sub);
            margin: 0 2px;
            animation: bounce 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: .2s; }
        .typing span:nth-child(3) { animation-delay: .4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: .4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ========== 输入区 ========== */
        .input-area {
            padding: 8px 12px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 6px;
            align-items: flex-end;
            flex-shrink: 0;
            background: var(--card);
            transition: background .3s;
        }
        .app.wide .input-area { padding: 12px 24px; }
        .input-area textarea {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 14px;
            outline: none;
            resize: none;
            max-height: 100px;
            min-height: 36px;
            line-height: 1.4;
            font-family: inherit;
            color: var(--text);
            background: var(--input-bg);
            transition: border-color .2s, background .3s, color .3s;
        }
        .input-area textarea:focus { border-color: var(--accent); }
        .input-area .btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all .15s;
        }
        .btn-send { background: var(--accent); color: #fff; }
        .btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }
        .btn-send:disabled { opacity: .5; transform: none; cursor: not-allowed; }
        .btn-attach { background: var(--input-bg); color: var(--sub); }
        .btn-attach:hover { background: var(--border); }
        .btn-stop { background: var(--danger); color: #fff; }
        .btn-stop:hover { opacity: .85; }

        .image-preview {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            padding: 6px 16px 0;
            flex-shrink: 0;
        }
        .image-preview .preview-item {
            position: relative;
            width: 56px; height: 56px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }
        .image-preview .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .image-preview .preview-item .remove {
            position: absolute; top: 0; right: 0;
            width: 18px; height: 18px;
            background: rgba(0,0,0,.5);
            color: #fff;
            border: none;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== 手机抽屉 ========== */
        .drawer-overlay {
            position: fixed; inset: 0;
            background: var(--overlay-bg);
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s;
        }
        .drawer-overlay.on { opacity: 1; pointer-events: auto; }
        .drawer {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: 280px;
            background: var(--card);
            z-index: 60;
            transform: translateX(-100%);
            transition: transform .25s;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0,0,0,.15);
        }

<script>
    'use strict';

    const STORAGE_KEY = 'ai_chat_data_v5';
    const PRESET_AVATARS = ['🤖','🧠','✨','🦊','🐱','🐶','👾','💎','🔥','🌟','🎯','🦾'];
    const ACCENT_COLORS = [
        { n: 'blue',   c: '#2563eb', l: '蓝色' },
        { n: 'purple', c: '#7c3aed', l: '紫色' },
        { n: 'green',  c: '#059669', l: '绿色' },
        { n: 'orange', c: '#ea580c', l: '橙色' }
    ];

    const PRESET_PROVIDERS = [
        { n: 'DeepSeek',     u: 'https://api.deepseek.com/chat/completions',                m: 'deepseek-v4-flash',     k: 'https://platform.deepseek.com/api_keys' },
        { n: '阿里百炼',     u: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', m: 'qwen3.6-flash',        k: 'https://dashscope.console.aliyun.com/apiKey' },
        { n: '硅基流动',     u: 'https://api.siliconflow.cn/v1/chat/completions',            m: 'deepseek-ai/DeepSeek-V3.1', k: 'https://cloud.siliconflow.cn/account/ak' },
        { n: '智谱 GLM',     u: 'https://open.bigmodel.cn/api/paas/v4/chat/completions',     m: 'GLM-4.7-Flash',         k: 'https://open.bigmodel.cn/usercenter/apikeys' },
        { n: '月之暗面 Kimi', u: 'https://api.moonshot.cn/v1/chat/completions',              m: 'kimi-k2.6',             k: 'https://platform.moonshot.cn/console/api-keys' },
        { n: '百川 Baichuan', u: 'https://api.baichuan-ai.com/v1/chat/completions',          m: 'Baichuan4-Turbo',       k: 'https://platform.baichuan-ai.com/console/apikey' },
        { n: '零一万物 Yi',  u: 'https://api.lingyiwanwu.com/v1/chat/completions',           m: 'yi-lightning',          k: 'https://platform.lingyiwanwu.com/apikeys' },
        { n: 'MiniMax',      u: 'https://api.minimaxi.com/v1/chat/completions',             m: 'MiniMax-M2.7',          k: 'https://platform.minimaxi.com/user-center/payment/token-plan' }
    ];

    var state = {
        profiles: [],
        conversations: [],
        activeChatId: null,
        pendingImages: [],
        isProcessing: false,
        editingProfileId: null,
        abortController: null,
        wideLayout: false,
        wideSidebarCollapsed: false,
        wideSettingsOpen: false,
        settingsTab: 'models',
        theme: 'light',
        accentColor: 'blue',
        streamMode: true,
        contextCount: 10,
        serverKey: ''
    };

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            profiles: state.profiles,
            conversations: state.conversations,
            activeChatId: state.activeChatId,
            wideLayout: state.wideLayout,
            wideSidebarCollapsed: state.wideSidebarCollapsed,
            theme: state.theme,
            accentColor: state.accentColor,
            streamMode: state.streamMode,
            contextCount: state.contextCount,
            serverKey: state.serverKey
        }));
    }

    function loadState() {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try {
                var d = JSON.parse(raw);
                state.profiles = d.profiles || [];
                state.conversations = d.conversations || [];
                state.activeChatId = d.activeChatId || null;
                state.wideLayout = d.wideLayout || false;
                state.wideSidebarCollapsed = d.wideSidebarCollapsed || false;
                state.theme = d.theme || 'light';
                state.accentColor = d.accentColor || 'blue';
                state.streamMode = d.streamMode !== false;
                state.contextCount = d.contextCount || 10;
                state.serverKey = d.serverKey || '';
            } catch (e) {}
        }
        if (!state.conversations.length) state.activeChatId = null;
        if (state.activeChatId && !state.conversations.find(function(c) { return c.id === state.activeChatId; })) {
            state.activeChatId = state.conversations.length ? state.conversations[0].id : null;
        }
    }

    function genId() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }
    function getActiveChat() {
        return state.conversations.find(function(c) { return c.id === state.activeChatId; }) || null;
    }
    function getProfile(pid) {
        return state.profiles.find(function(p) { return p.id === pid; }) || null;
    }

    function getAiAvatarHTML(profile) {
        if (!profile) return '🤖';
        if (profile.aiAvatarImage) {
            return '<img src="' + profile.aiAvatarImage + '" style="width:30px;height:30px;border-radius:50%;object-fit:cover;">';
        }
        return profile.aiAvatar || '🤖';
    }

    function apiUrl(path) {
        if (window.location.protocol === 'file:') {
            return 'http://127.0.0.1:5030' + path;
        }
        return path;
    }

    function buildRequestBody(extra) {
        if (!extra) extra = {};
        if (state.serverKey) extra.server_key = state.serverKey;
        return extra;
    }

    // ---------- 主题 ----------
    function toggleTheme() {
        state.theme = state.theme === 'light' ? 'dark' : 'light';
        applyTheme();
        saveState();
    }
    function applyTheme() {
        document.documentElement.setAttribute('data-theme', state.theme);
        document.getElementById('themeEmoji').textContent = state.theme === 'dark' ? '☀' : '🌙';
    }
    function applyAccent() {
        ACCENT_COLORS.forEach(function(a) {
            document.body.classList.remove('accent-' + a.n);
        });
        var preset = ACCENT_COLORS.find(function(a) { return a.n === state.accentColor; });
        if (preset || state.accentColor === 'blue' || state.accentColor === 'purple' || state.accentColor === 'green' || state.accentColor === 'orange') {
            document.body.style.removeProperty('--accent');
            document.body.style.removeProperty('--bubble-user');
            document.body.style.removeProperty('--accent-hover');
            document.body.style.removeProperty('--accent-light');
            document.body.classList.add('accent-' + (preset ? preset.n : state.accentColor));
        } else {
            document.body.style.setProperty('--accent', state.accentColor);
            document.body.style.setProperty('--bubble-user', state.accentColor);
            document.body.style.setProperty('--accent-hover', adjustBrightness(state.accentColor, -15));
            document.body.style.setProperty('--accent-light', adjustBrightness(state.accentColor, 35));
        }
    }

    function adjustBrightness(hex, percent) {
        var num = parseInt(hex.replace('#', ''), 16);
        var r = Math.min(255, Math.max(0, (num >> 16) + percent));
        var g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
        var b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
        return '#' + (0x1000000 + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }

    // ---------- 布局 ----------
    function toggleLayout() {
        state.wideLayout = !state.wideLayout;
        applyLayout();
        saveState();
        renderAll();
        showToast(state.wideLayout ? '网页布局' : '紧凑布局');
    }
    function toggleWideSidebar() {
        state.wideSidebarCollapsed = !state.wideSidebarCollapsed;
        applyLayout();
        saveState();
        renderAll();
    }
    function applyLayout() {
        var appEl = document.getElementById('app');
        var lsTrack = document.getElementById('lsTrack');
        var lsLabel = document.getElementById('lsLabel');
        var wideSettings = document.getElementById('wideSettings');
        var wideSidebar = document.getElementById('wideSidebar');
        if (state.wideLayout) {
            appEl.classList.add('wide');
            lsTrack.classList.add('on');
            lsLabel.textContent = '🖥';
        } else {
            appEl.classList.remove('wide');
            lsTrack.classList.remove('on');
            lsLabel.textContent = '📱';
            state.wideSettingsOpen = false;
            wideSettings.classList.remove('show');
        }
        wideSidebar.classList.toggle('collapsed', state.wideSidebarCollapsed);
    }

    // ---------- 渲染 ----------
    function renderAll() {
        renderDrawer();
        renderWideSidebar();
        renderChat();
        renderHeader();
        renderImagePreview();
    }

    function renderHeader() {
        var chat = getActiveChat();
        var profile = chat ? getProfile(chat.profileId) : null;
        var titleEl = document.getElementById('chatTitle');
        var tagEl = document.getElementById('modelTag');
        titleEl.textContent = chat ? ((chat.tag ? '[' + chat.tag + '] ' : '') + (chat.title || '未命名对话')) : '新对话';
        tagEl.textContent = profile ? (profile.aiName || profile.name) : '未配置';
    }

    function renderDrawer() {
        var drawerList = document.getElementById('drawerList');
        if (!state.conversations.length) {
            drawerList.innerHTML = '<div class="drawer-empty">还没有对话<br>点击 + 开始</div>';
            return;
        }
        drawerList.innerHTML = state.conversations.map(buildChatItemHTML).join('');
    }

    function renderWideSidebar() {
        var wsList = document.getElementById('wsList');
        var wsEmpty = document.getElementById('wsEmpty');
        if (!state.conversations.length) {
            wsList.innerHTML = '';
            wsEmpty.style.display = '';
        } else {
            wsEmpty.style.display = 'none';
            wsList.innerHTML = state.conversations.map(buildChatItemHTML).join('');
        }
    }

    function buildChatItemHTML(c) {
        var lastMsg = c.messages.length ? c.messages[c.messages.length - 1] : null;
        var preview = lastMsg ? (lastMsg.content || '[图片]').slice(0, 40) : '空对话';
        var time = lastMsg ? fmtTime(lastMsg.time) : fmtTime(c.createdAt);
        var active = c.id === state.activeChatId ? ' active' : '';
        var tagHtml = c.tag ? '<span class="ws-tag">' + escapeHtml(c.tag) + '</span>' : '';
        var ctxHtml = c.messages.length > 1 ? '<span class="ws-ctx">● 记忆</span>' : '';
        return '<div class="ws-item' + active + '" onclick="switchChat(\'' + c.id + '\')">' +
            '<div class="ws-icon">💬</div>' +
            '<div class="ws-info">' +
                '<div class="ws-t">' + escapeHtml(c.title || '未命名对话') + tagHtml + ctxHtml + '</div>' +
                '<div class="ws-sub">' + escapeHtml(preview) + ' · ' + time + '</div>' +
            '</div>' +
            '<button class="export-btn" onclick="event.stopPropagation();exportChat(\'' + c.id + '\')" title="导出">📥</button>' +
            '<button class="ws-del" onclick="event.stopPropagation();deleteChat(\'' + c.id + '\')" title="删除">🗑</button>' +
        '</div>';
    }

    function renderChat() {
        var chat = getActiveChat();
        var profile = chat ? getProfile(chat.profileId) : null;
        var aiAvatarHTML = getAiAvatarHTML(profile);
        var msgContainer = document.getElementById('chatMessages');
        var welcome = document.getElementById('welcomeMsg');

        if (!chat || !chat.messages.length) {
            msgContainer.innerHTML = '';
            if (welcome) {
                msgContainer.appendChild(welcome);
                welcome.style.display = '';
            }
            return;
        }
        if (welcome) welcome.style.display = 'none';

        msgContainer.innerHTML = chat.messages.map(function(m, i) {
            var avatar = m.role === 'user' ? '👤' : aiAvatarHTML;
            var cls = m.role === 'user' ? 'user' : 'ai';
            var bubbleContent = m.role === 'user' ? escapeHtml(m.content) : mdToHtml(m.content);
            var imgs = '';
            if (m.images && m.images.length) {
                imgs = m.images.map(function(img) {
                    return '<img src="' + img + '" style="max-width:200px;border-radius:8px;margin:4px 0;" loading="lazy">';
                }).join('');
            }
            var think = (m.role === 'ai' && m.reasoning) ? thinkHtml(m.reasoning) : '';
            var isLastAi = m.role === 'ai' && i === chat.messages.length - 1 && !state.isProcessing;
            return '<div class="msg ' + cls + '">' +
                '<div class="avatar">' + avatar + '</div>' +
                '<div class="body">' +
                    '<div class="bubble">' + think + bubbleContent + imgs + '</div>' +
                    '<div class="time">' + fmtTime(m.time) + '</div>' +
                    '<div class="msg-actions">' +
                        (m.role === 'ai' ? '<button class="copy-btn" onclick="copyMsg(' + i + ')">📋</button>' : '') +
                        (isLastAi ? '<button class="retry-btn" onclick="regenerate()" title="重新生成">🔄</button>' : '') +
                    '</div>' +
                '</div>' +
            '</div>';
        }).join('');

        scrollBottom();
        requestAnimationFrame(function() {
            var codes = document.getElementById('chatMessages').querySelectorAll('.bubble pre code');
            codes.forEach(function(el) { if (window.hljs) hljs.highlightElement(el); });
        });
    }

    function renderImagePreview() {
        var preview = document.getElementById('imagePreview');
        if (!state.pendingImages.length) { preview.innerHTML = ''; return; }
        preview.innerHTML = state.pendingImages.map(function(img, i) {
            return '<div class="preview-item"><img src="' + img + '"><button class="remove" onclick="removeImage(' + i + ')">✕</button></div>';
        }).join('');
    }

    function fillEditingForm(target) {
        if (!state.editingProfileId) return;
        var p = getProfile(state.editingProfileId);
        if (!p) return;
        function sv(id, val) { var el = document.getElementById(target + id); if (el) el.value = val || ''; }
        sv('Name', p.name);
        sv('Key', p.apiKey);
        sv('Url', p.apiUrl);
        sv('Model', p.model);
        sv('System', p.systemPrompt);
        sv('AiName', p.aiName);
        sv('AiAvatar', p.aiAvatar);
        sv('AiAvatarImage', p.aiAvatarImage || '');
        sv('Temp', p.temperature || '');
        sv('MaxTokens', p.maxTokens || '');
        highlightPickedAvatar(target, p.aiAvatar);

        if (preview) {
            if (p.aiAvatarImage) {
                preview.innerHTML = '<img src="' + p.aiAvatarImage + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';

                preview.innerHTML = p.aiAvatar || '🤖';
            }

    function pickAvatar(target, emoji) {
        var inp = document.getElementById(target + 'AiAvatar');
        if (inp) inp.value = emoji;
        document.getElementById(target + 'AiAvatarImage').value = '';
        var preview = document.getElementById(target + 'AvatarPreview');
        if (preview) preview.innerHTML = emoji;
        highlightPickedAvatar(target, emoji);

    function highlightPickedAvatar(target, emoji) {
        var pk = document.getElementById(target + 'AvatarPicker');
        if (!pk) return;
        pk.querySelectorAll('.av-opt').forEach(function(el) {
            el.classList.toggle('sel', el.dataset.av === emoji);

    function handleAvatarUpload(target) {
        var file = document.getElementById(target + 'AiImgFile').files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function() {
            document.getElementById(target + 'AiAvatarImage').value = reader.result;
            var preview = document.getElementById(target + 'AvatarPreview');
            preview.innerHTML = '<img src="' + reader.result + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
            document.getElementById(target + 'AiAvatar').value = '';
            document.getElementById(target + 'AiImgFile').value = '';
            highlightPickedAvatar(target, '');
        };
        reader.readAsDataURL(file);
    }

    function resetAvatarImage(target) {
        document.getElementById(target + 'AiAvatarImage').value = '';
        var preview = document.getElementById(target + 'AvatarPreview');
        preview.innerHTML = '🤖';
        document.getElementById(target + 'AiAvatar').value = '';
        document.getElementById(target + 'AiImgFile').value = '';
        highlightPickedAvatar(target, '');

    function switchSettingsTab(tab, target) {
        state.settingsTab = tab;
        rerenderSettings();
    }
    function setAccent(n) {
        state.accentColor = n;
        applyAccent();
        saveState();
        rerenderSettings();
    }

    // ---------- 对话操作 ----------
    function newChat() {
        if (state.pendingImages.length) { showToast('请先发送或清除图片'); return; }
        var cur = getActiveChat();
        if (cur && cur.messages.length === 0) {
            showToast('当前对话已是空');
            document.getElementById('prompt').focus();
            return;
        }
        var id = genId();
        var lastProfileId = null;
        if (cur && cur.profileId) {
            lastProfileId = cur.profileId;
        } else if (state.conversations.length) {
            for (var i = 0; i < state.conversations.length; i++) {
                if (state.conversations[i].profileId) { lastProfileId = state.conversations[i].profileId; break; }
            }
        }
        state.conversations.unshift({
            id: id,
            title: '新对话',
            createdAt: Date.now(),
            profileId: lastProfileId || (state.profiles.length ? state.profiles[0].id : null),
            messages: [],
            tag: ''
        });
        state.activeChatId = id;
        saveState();
        renderAll();
        closeDrawer();
        document.getElementById('prompt').focus();
    }

    function switchChat(id) {
        state.activeChatId = id;
        saveState();
        renderAll();
        closeDrawer();
    }

    function deleteChat(id) {
        if (!confirm('确定删除该对话？')) return;
        state.conversations = state.conversations.filter(function(c) { return c.id !== id; });
        if (state.activeChatId === id) {
            state.activeChatId = state.conversations.length ? state.conversations[0].id : null;
        }
        saveState();
        renderAll();
    }

    function deleteAllChats() {
        if (!state.conversations.length) { showToast('没有对话可清空'); return; }
        if (!confirm('确定清空全部 ' + state.conversations.length + ' 个对话？此操作不可恢复。')) return;
        state.conversations = [];
        state.activeChatId = null;
        saveState();
        renderAll();
        closeDrawer();
        showToast('已清空所有对话 ✓');
    }

    function selectProfile(pid) {
        var chat = getActiveChat();
        if (!chat) { showToast('请先创建对话'); return; }
        chat.profileId = pid;
        saveState();
        renderAll();
        closeSettings();
        showToast('已切换模型 ✓');
    }

    // ---------- 配置 CRUD ----------
    function editProfile(id) {
        state.editingProfileId = id;
        openSettings();
    }
    function cancelEdit() {
        state.editingProfileId = null;
        rerenderSettings();
    }

    function saveProfile(target) {
        function f(id) { var el = document.getElementById(target + id); return el ? el.value.trim() : null; }
        function fe(id) { return !!document.getElementById(target + id); }

        var name = null, apiKey = null, apiUrl = null, model = null, systemPrompt = null;
        var aiName = null, aiAvatar = null, aiAvatarImage = null, editId = null;
        var temperature = null, maxTokens = null;

        if (fe('Name')) name = f('Name');
        if (fe('Key')) apiKey = f('Key');
        if (fe('Url')) apiUrl = f('Url');
        if (fe('Model')) model = f('Model');
        if (fe('System')) systemPrompt = f('System');
        if (fe('AiName')) aiName = f('AiName');
        if (fe('AiAvatar')) aiAvatar = f('AiAvatar');
        if (fe('AiAvatarImage')) aiAvatarImage = f('AiAvatarImage');
        if (fe('EditId')) editId = f('EditId');
        if (fe('Temp')) temperature = f('Temp');
        if (fe('MaxTokens')) maxTokens = f('MaxTokens');

        if (editId) {
            var p = state.profiles.find(function(x) { return x.id === editId; });
            if (!p) { showToast('配置不存在'); return; }
            if (name === null) name = p.name;
            if (apiKey === null) apiKey = p.apiKey;
            if (apiUrl === null) apiUrl = p.apiUrl;
            if (model === null) model = p.model;
            if (systemPrompt === null) systemPrompt = p.systemPrompt;
            if (aiName === null) aiName = p.aiName;
            if (aiAvatar === null) aiAvatar = p.aiAvatar;
            if (aiAvatarImage === null) aiAvatarImage = p.aiAvatarImage;
            if (temperature === null) temperature = p.temperature;
            if (maxTokens === null) maxTokens = p.maxTokens;
        }

        if (!name || !apiKey || !apiUrl || !model) { showToast('请填写完整模型信息'); return; }

        var data = { name: name, apiKey: apiKey, apiUrl: apiUrl, model: model, systemPrompt: systemPrompt };
        if (aiName !== null) data.aiName = aiName;
        if (aiAvatar !== null) data.aiAvatar = aiAvatar;
        if (aiAvatarImage !== null) data.aiAvatarImage = aiAvatarImage;
        if (temperature !== null) data.temperature = temperature;
        if (maxTokens !== null) data.maxTokens = maxTokens;
        if (!data.aiName) data.aiName = name;
        if (!data.aiAvatar) data.aiAvatar = '🤖';

        if (editId) {
            var existing = state.profiles.find(function(x) { return x.id === editId; });
            if (existing) Object.assign(existing, data);
            state.editingProfileId = null;
        } else {
            data.id = genId();
            state.profiles.push(data);
            var chat = getActiveChat();
            if (chat && !chat.profileId) chat.profileId = data.id;
        }

        saveState();
        rerenderSettings();
        renderAll();
        showToast(editId ? '配置已更新 ✓' : '配置已保存 ✓');
    }

    // ---------- 文件 ----------
    function handleFiles(files) {
        if (!files || !files.length) return;
        var loaded = 0;
        Array.from(files).forEach(function(f) {
            if (!f.type.startsWith('image/')) { showToast('仅支持图片'); return; }
            var r = new FileReader();
            r.onload = function() {
                state.pendingImages.push(r.result);
                loaded++;
                if (loaded === files.length) renderImagePreview();
            };
            r.readAsDataURL(f);
        });
        document.getElementById('fileInput').value = '';
    }
    function removeImage(i) { state.pendingImages.splice(i, 1); renderImagePreview(); }

    // ---------- 上下文记忆 ----------
    // 注意：调用时最新一条用户消息已被 push 进 messages，它会作为 prompt 单独发送，
    // 这里要排除掉它，否则同一句话会发两遍
    function buildContext() {
        var chat = getActiveChat();
        if (!chat || !state.contextCount) return null;
        var msgs = [];
        var end = chat.messages.length - 1;
        var start = Math.max(0, end - state.contextCount * 2);
        for (var i = start; i < end; i++) {
            var m = chat.messages[i];
            if (m.role === 'user' || m.role === 'ai') msgs.push({ role: m.role === 'ai' ? 'assistant' : m.role, content: m.content });
        }
        return msgs;
    }

    // ---------- 发送消息 ----------
    function send() {
        if (state.isProcessing) return;
        var prompt = document.getElementById('prompt').value.trim();
        if (!prompt && !state.pendingImages.length) return;
        var chat = getActiveChat();
        if (!chat) { showToast('请先新建对话'); return; }
        var profile = getProfile(chat.profileId);
        if (!profile) { showToast('请先配置模型'); return; }

        var content = prompt || '';
        var images = state.pendingImages.slice();
        chat.messages.push({
            role: 'user',
            content: content,
            time: Date.now(),
            images: images.length ? images : undefined
        });
        if (!chat.title || chat.title === '新对话') chat.title = content.slice(0, 30) || '图片对话';
        state.pendingImages = [];
        document.getElementById('prompt').value = '';
        document.getElementById('prompt').style.height = 'auto';
        saveState();
        renderAll();

        if (state.streamMode) {
            sendStream(chat, profile, content, images);
        } else {
            sendNormal(chat, profile, content, images);
        }
    }

    function buildAskBody(profile, content, images) {
        var body = {
            api_key: profile.apiKey,
            api_url: profile.apiUrl,
            model: profile.model,
            prompt: content,
            system_prompt: profile.systemPrompt || ''
        };
        var temp = parseFloat(profile.temperature);
        if (!isNaN(temp)) body.temperature = temp;
        var maxTok = parseInt(profile.maxTokens);
        if (!isNaN(maxTok)) body.max_tokens = maxTok;
        if (images.length) body.images = images;
        var ctx = buildContext();
        if (ctx && ctx.length) body.messages = ctx;
        return body;
    }

    function setProcessing(on) {
        state.isProcessing = on;
        document.getElementById('sendBtn').style.display = on ? 'none' : '';
        document.getElementById('stopBtn').style.display = on ? '' : 'none';
    }

    function stopGeneration() {
        if (state.abortController) state.abortController.abort();
    }

    function sendNormal(chat, profile, content, images) {
        addTyping();
        setProcessing(true);
        var ac = new AbortController();
        state.abortController = ac;
        fetch(apiUrl('/ask_ai'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(buildRequestBody(buildAskBody(profile, content, images))),
            signal: ac.signal
        }).then(function(r) { return r.json(); })
        .then(function(d) {
            var msg = { role: 'ai', content: d.error ? '❌ ' + d.error : (d.reply || '(空回复)'), time: Date.now() };
            if (d.reasoning) msg.reasoning = d.reasoning;
            chat.messages.push(msg);
        }).catch(function(e) {
            var text = e.name === 'AbortError' ? '(已停止生成)' : '⚠ 网络失败，检查后端 (5030)';
            chat.messages.push({ role: 'ai', content: text, time: Date.now() });
        }).finally(function() {
            removeTyping();
            state.abortController = null;
            setProcessing(false);
            saveState();
            renderAll();
            document.getElementById('prompt').focus();
        });
    }

    function sendStream(chat, profile, content, images) {
        var aiAvatarHTML = getAiAvatarHTML(profile);
        var msgContainer = document.getElementById('chatMessages');
        var row = document.createElement('div');
        row.className = 'msg ai';
        row.id = 'streamRow';
        row.innerHTML = '<div class="avatar">' + aiAvatarHTML + '</div><div class="body"><div class="bubble" id="streamBubble"></div></div>';
        var w = document.getElementById('welcomeMsg');
        if (w) w.style.display = 'none';
        msgContainer.appendChild(row);
        scrollBottom();

        setProcessing(true);
        var full = '';
        var thinking = '';
        var lastPaint = 0;

        // 节流重绘；代码高亮留到结束后统一做，长回复不至于越写越卡
        function paint() {
            var now = Date.now();
            if (now - lastPaint < 80) return;
            lastPaint = now;
            var bubble = document.getElementById('streamBubble');
            if (!bubble) return;
            bubble.innerHTML = (thinking ? thinkHtml(thinking, true) : '') + mdToHtml(full);
            scrollBottomIfNear();
        }

        var ac = new AbortController();
        state.abortController = ac;

        fetch(apiUrl('/ask_ai_stream'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(buildRequestBody(buildAskBody(profile, content, images))),
            signal: ac.signal
        }).then(function(resp) {
            if (!resp.ok) {
                resp.json().then(function(d) { cleanup('❌ ' + (d.error || '服务器错误')); })
                    .catch(function() { cleanup('❌ 服务器错误 (' + resp.status + ')'); });
                return;
            }
            var reader = resp.body.getReader();
            var decoder = new TextDecoder();
            var buf = '';

            function pump() {
                reader.read().then(function(result) {
                    if (result.done) {
                        cleanup(full);
                        return;
                    }
                    buf += decoder.decode(result.value, { stream: true });
                    var lines = buf.split('\n');
                    buf = lines.pop();
                    var finished = false;
                    lines.forEach(function(line) {
                        if (finished || !line.startsWith('data: ')) return;
                        try {
                            var d = JSON.parse(line.slice(6));
                            if (d.reasoning) thinking += d.reasoning;
                            if (d.content) full += d.content;
                            if (d.done) { full = d.full || full; finished = true; cleanup(full); return; }
                            if (d.error) { full = '❌ ' + d.error; finished = true; cleanup(full); return; }
                        } catch(e) {}
                    });
                    if (finished) return;
                    paint();
                    pump();
                }).catch(function(e) {
                    // 中途停止时保留已生成的部分
                    cleanup(full || (e.name === 'AbortError' ? '(已停止生成)' : '⚠ ' + e.message));
                });
            }
            pump();
        }).catch(function(e) {
            if (e.name !== 'AbortError') cleanup('⚠ ' + e.message);
            else cleanup(full || '(已停止生成)');
        });

        function cleanup(result) {
            var srow = document.getElementById('streamRow');
            if (srow) srow.remove();
            state.abortController = null;
            var msg = { role: 'ai', content: result || '空回复', time: Date.now() };
            if (thinking) msg.reasoning = thinking;
            chat.messages.push(msg);
            setProcessing(false);
            saveState();
            renderAll();
            document.getElementById('prompt').focus();
        }
    }

    function regenerate() {
        var chat = getActiveChat();
        if (!chat || !chat.messages.length || state.isProcessing) return;
        var last = chat.messages[chat.messages.length - 1];
        if (last.role !== 'ai') return;
        var idx = -1;
        for (var i = chat.messages.length - 1; i >= 0; i--) {
            if (chat.messages[i].role === 'user') { idx = i; break; }
        }
        if (idx === -1) return;
        var prevUser = chat.messages[idx];
        chat.messages = chat.messages.slice(0, -1);
        saveState();
        renderAll();
        var content = prevUser.content || '';
        var images = prevUser.images ? prevUser.images.slice() : [];
        chat.messages.push({ role: 'user', content: content, time: Date.now(), images: images.length ? images : undefined });
        saveState();
        renderAll();
        var profile = getProfile(chat.profileId);
        if (!profile) return;
        if (state.streamMode) sendStream(chat, profile, content, images);
        else sendNormal(chat, profile, content, images);
    }

    function scrollBottom() {
        requestAnimationFrame(function() {
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        });

    // 流式输出时只有用户本来就在底部附近才跟随滚动，往上翻看时不打扰
    function scrollBottomIfNear() {
        var el = document.getElementById('chatMessages');
        if (el.scrollHeight - el.scrollTop - el.clientHeight < 120) el.scrollTop = el.scrollHeight;
    }
    function fmtTime(ts) {
        var d = new Date(ts);
        var now = new Date();
        function pad(n) { return String(n).padStart(2, '0'); }
        if (d.toDateString() === now.toDateString()) return pad(d.getHours()) + ':' + pad(d.getMinutes());
        return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
    function escapeHtml(t) {
        return String(t == null ? '' : t).replace(/[&<>"']/g, function(c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
    }

    function thinkHtml(text, open) {
        return '<details class="think"' + (open ? ' open' : '') + '><summary>💭 思考过程</summary>' +
            '<div class="think-body">' + escapeHtml(text).replace(/\n/g, '<br>') + '</div></details>';
    }

    // 只放行 http(s) / mailto，图片额外放行 data:image，避免 javascript: 之类的链接
    function safeUrl(u, allowData) {
        u = (u || '').trim().replace(/"/g, '%22');
        if (/^https?:\/\//i.test(u) || /^mailto:/i.test(u)) return u;
        if (allowData && /^data:image\//i.test(u)) return u;
        return '#';
    }

    // 行内元素：图片、链接、粗体、斜体、删除线（输入已 HTML 转义）
    function mdInline(h) {
        h = h.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, function(_, a, u) { return '<img src="' + safeUrl(u, true) + '" alt="' + a + '" loading="lazy">'; });
        h = h.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, function(_, t, u) { return '<a href="' + safeUrl(u) + '" target="_blank" rel="noopener">' + t + '</a>'; });
        h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        h = h.replace(/\*(\S(?:[^*]*\S)?)\*/g, '<em>$1</em>');
        h = h.replace(/~~(.+?)~~/g, '<del>$1</del>');
        return h;
    }

    function mdToHtml(md) {
        if (!md) return '';
        var h = escapeHtml(md);
        var stash = [];
        function stashPut(html) {
            stash.push(html);
            return '\u0000' + (stash.length - 1) + '\u0000';
        }
        // 先把代码块摘出来存好，防止内部内容被当作 Markdown 解析；
        // 未闭合的围栏也按代码块处理，这样流式输出时代码能边收边显示
        h = h.replace(/`{3}([\w+#.-]*)[^\S\n]*\n?([\s\S]*?)(?:`{3}|$)/g, function(_, lang, code) {
            var cls = lang ? ' class="language-' + lang + '"' : '';
            return stashPut('<pre><div class="code-head"><span>' + (lang || 'code') + '</span>' +
                '<button class="code-copy" type="button">复制</button></div>' +
                '<code' + cls + '>' + code.replace(/\n$/, '') + '</code></pre>');
        });
        h = h.replace(/`([^`\n]+)`/g, function(_, c) { return stashPut('<code>' + c + '</code>'); });

        var lines = h.split('\n');
        var out = [];
        var para = [];
        var listType = null;
        function flushPara() {
            if (para.length) { out.push('<p>' + para.map(mdInline).join('<br>') + '</p>'); para = []; }
        }
        function closeList() {
            if (listType) { out.push('</' + listType + '>'); listType = null; }
        }
        function tableCells(row) {
            return row.replace(/^\||\|$/g, '').split('|').map(function(c) { return c.trim(); });
        }

        for (var i = 0; i < lines.length; i++) {
            var t = lines[i].trim();
            var m;
            if (!t) { flushPara(); closeList(); continue; }
            if (/^\u0000\d+\u0000$/.test(t)) { flushPara(); closeList(); out.push(t); continue; }
            if ((m = t.match(/^(#{1,4})\s+(.+)$/))) {
                flushPara(); closeList();
                var lv = m[1].length + 1;
                out.push('<h' + lv + '>' + mdInline(m[2]) + '</h' + lv + '>');
                continue;
            }
            if (/^(-{3,}|\*{3,})$/.test(t)) { flushPara(); closeList(); out.push('<hr>'); continue; }
            if (/^&gt;/.test(t)) {
                flushPara(); closeList();
                var quote = [];
                while (i < lines.length && /^&gt;/.test(lines[i].trim())) {
                    quote.push(lines[i].trim().replace(/^&gt;\s?/, ''));
                    i++;
                }
                i--;
                out.push('<blockquote>' + quote.map(mdInline).join('<br>') + '</blockquote>');
                continue;
            }
            // 表格：表头行 + 至少含一个 - 的分隔行
            if (t.indexOf('|') !== -1 && i + 1 < lines.length &&
                /^\|?[\s:|-]+$/.test(lines[i + 1].trim()) && lines[i + 1].indexOf('-') !== -1 && lines[i + 1].indexOf('|') !== -1) {
                flushPara(); closeList();
                var tbl = '<table><thead><tr>' + tableCells(t).map(function(c) { return '<th>' + mdInline(c) + '</th>'; }).join('') + '</tr></thead><tbody>';
                i++;
                while (i + 1 < lines.length && lines[i + 1].indexOf('|') !== -1 && lines[i + 1].trim()) {
                    i++;
                    tbl += '<tr>' + tableCells(lines[i].trim()).map(function(c) { return '<td>' + mdInline(c) + '</td>'; }).join('') + '</tr>';
                }
                out.push(tbl + '</tbody></table>');
                continue;
            }
            if ((m = t.match(/^[-*]\s+(.+)$/))) {
                flushPara();
                if (listType !== 'ul') { closeList(); out.push('<ul>'); listType = 'ul'; }
                out.push('<li>' + mdInline(m[1]) + '</li>');
                continue;
            }
            if ((m = t.match(/^\d+[.)]\s+(.+)$/))) {
                flushPara();
                if (listType !== 'ol') { closeList(); out.push('<ol>'); listType = 'ol'; }
                out.push('<li>' + mdInline(m[1]) + '</li>');
                continue;
            }
            closeList();
            para.push(t);
        }
        flushPara();
        closeList();

        return out.join('').replace(/\u0000(\d+)\u0000/g, function(_, n) { return stash[+n]; });
    }

    // ---------- UI 控制 ----------
    function openDrawer() {
        document.getElementById('drawer').classList.add('on');
        document.getElementById('drawerOverlay').classList.add('on');
        renderDrawer();
    }
    function closeDrawer() {
        document.getElementById('drawer').classList.remove('on');
        document.getElementById('drawerOverlay').classList.remove('on');
    }
    function openSettings() {
        // 宽屏模式用右侧面板，紧凑模式用弹窗
        if (state.wideLayout) { openWideSettings(); return; }
        renderModalSettings();
        document.getElementById('settingsOverlay').classList.add('on');
    }
    function closeSettings() {
        document.getElementById('settingsOverlay').classList.remove('on');
        closeWideSettings();
    }
    function rerenderSettings() {
        if (document.getElementById('settingsOverlay').classList.contains('on')) renderModalSettings();
        if (state.wideSettingsOpen) renderWideSettings();
    }

    // ---------- 全局快捷键 ----------
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' || e.keyCode === 27) {
            e.preventDefault();
            var overlay = document.getElementById('settingsOverlay');
            if (overlay && overlay.classList.contains('on')) {
                closeSettings();
                return;
            }
            if (state.wideSettingsOpen) {
                closeWideSettings();
                return;
            }
            var drawer = document.getElementById('drawer');
            if (drawer && drawer.classList.contains('on')) {
                closeDrawer();
            }
        }
    }, true);
    function openWideSettings() {
        state.wideSettingsOpen = true;
        document.getElementById('wideSettings').classList.add('show');
        renderWideSettings();
    }
    function closeWideSettings() {
        state.wideSettingsOpen = false;
        document.getElementById('wideSettings').classList.remove('show');
    }
    function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._tid);
        t._tid = setTimeout(function() { t.classList.remove('show'); }, 2000);
    }

    // 代码块复制按钮（事件委托，重渲染后依然有效）
    document.getElementById('chatMessages').addEventListener('click', function(e) {
        var btn = e.target.closest('.code-copy');
        if (!btn) return;
        var pre = btn.closest('pre');
        var code = pre && pre.querySelector('code');
        if (!code) return;
        navigator.clipboard.writeText(code.innerText).then(function() {
            btn.textContent = '已复制 ✓';
            setTimeout(function() { btn.textContent = '复制'; }, 1500);
        }).catch(function() { showToast('复制失败'); });
    });

    // ---------- 输入事件 ----------
    document.getElementById('prompt').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    document.getElementById('prompt').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    // ---------- 启动 ----------
    loadState();
    applyTheme();
    applyAccent();
    applyLayout();
    renderAll();

</script>
</body>
</html>
